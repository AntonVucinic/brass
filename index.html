<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brass: Birmingham - P2P</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #2c3e50;
        color: #ecf0f1;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      .header {
        text-align: center;
        margin-bottom: 20px;
        border-bottom: 2px solid #e74c3c;
        padding-bottom: 10px;
      }
      h1 {
        color: #e74c3c;
      }
      .status {
        font-size: 14px;
        color: #95a5a6;
      }
      .network-setup {
        background: #34495e;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .network-setup h3 {
        color: #3498db;
        margin-bottom: 10px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      label {
        font-size: 12px;
        color: #bdc3c7;
      }
      input,
      button {
        padding: 8px;
        border: 1px solid #7f8c8d;
        border-radius: 3px;
        background: #2c3e50;
        color: #ecf0f1;
      }
      button {
        background: #e74c3c;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s;
      }
      button:hover {
        background: #c0392b;
      }
      button:disabled {
        background: #7f8c8d;
        cursor: not-allowed;
      }
      #offerText,
      #answerText {
        font-size: 11px;
        word-break: break-all;
        max-height: 80px;
        overflow-y: auto;
      }
      .game-area {
        display: grid;
        grid-template-columns: 3fr 1fr;
        gap: 20px;
      }
      .board {
        background: #34495e;
        padding: 20px;
        border-radius: 5px;
        border: 2px solid #e74c3c;
      }
      .sidebar {
        background: #34495e;
        padding: 20px;
        border-radius: 5px;
      }
      .board h2,
      .sidebar h2 {
        color: #3498db;
        margin-bottom: 15px;
      }
      .networks-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .network {
        background: #2c3e50;
        padding: 15px;
        border-radius: 5px;
        border-left: 4px solid #f39c12;
      }
      .network h3 {
        color: #f39c12;
        font-size: 14px;
        margin-bottom: 10px;
      }
      .network.canal {
        border-left-color: #3498db;
      }
      .network.canal h3 {
        color: #3498db;
      }
      .cities {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .city {
        background: #1c2833;
        border: 1px solid #7f8c8d;
        padding: 8px;
        border-radius: 3px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.3s;
      }
      .city:hover {
        background: #34495e;
        border-color: #3498db;
      }
      .city.owned {
        background: #27ae60;
      }
      .players-info {
        background: #2c3e50;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 15px;
      }
      .player {
        padding: 8px;
        margin-bottom: 8px;
        background: #1c2833;
        border-left: 3px solid #95a5a6;
        font-size: 12px;
      }
      .player.current {
        border-left-color: #e74c3c;
        background: #34495e;
      }
      .hand {
        background: #2c3e50;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 15px;
      }
      .hand h3 {
        color: #e74c3c;
        font-size: 13px;
        margin-bottom: 10px;
      }
      .cards {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .card {
        background: #1c2833;
        border: 1px solid #7f8c8d;
        padding: 8px 12px;
        border-radius: 3px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.3s;
      }
      .card:hover {
        background: #34495e;
        border-color: #3498db;
      }
      .card.selected {
        border-color: #e74c3c;
        background: #34495e;
      }
      .action-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }
      .action-buttons button {
        padding: 10px;
      }
      .log {
        background: #1c2833;
        padding: 10px;
        border-radius: 3px;
        font-size: 11px;
        max-height: 150px;
        overflow-y: auto;
        color: #95a5a6;
      }
      .log-entry {
        margin-bottom: 5px;
      }
      .log-entry.own {
        color: #e74c3c;
      }
      .log-entry.other {
        color: #3498db;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>♠ Brass: Birmingham - P2P Edition</h1>
        <div class="status">
          Connection: <span id="connectionStatus">Not connected</span>
        </div>
      </div>
      <div class="network-setup">
        <div>
          <h3>Peer 1 (Create)</h3>
          <div class="form-group">
            <label>Your Name</label>
            <input
              type="text"
              id="player1Name"
              placeholder="Player 1"
              value="Player 1"
            />
            <button onclick="createOffer()">Generate Offer</button>
            <label style="margin-top: 10px">Offer (send to Peer 2):</label>
            <textarea id="offerText" readonly></textarea>
          </div>
        </div>
        <div>
          <h3>Peer 2 (Join)</h3>
          <div class="form-group">
            <label>Your Name</label>
            <input
              type="text"
              id="player2Name"
              placeholder="Player 2"
              value="Player 2"
            />
            <label>Paste Offer here:</label>
            <textarea
              id="offerInput"
              placeholder="Paste offer from Peer 1"
            ></textarea>
            <button onclick="createAnswer()">Generate Answer</button>
            <label style="margin-top: 10px">Answer (send to Peer 1):</label>
            <textarea id="answerText" readonly></textarea>
          </div>
        </div>
      </div>
      <div
        style="
          background: #34495e;
          padding: 15px;
          border-radius: 5px;
          margin-bottom: 20px;
        "
      >
        <div class="form-group">
          <label>Peer 1: Paste Answer here:</label>
          <textarea
            id="answerInput"
            placeholder="Paste answer from Peer 2"
          ></textarea>
          <button onclick="consumeAnswer()" style="margin-top: 5px">
            Connect
          </button>
        </div>
      </div>
      <div class="game-area">
        <div class="board">
          <h2>Game Board</h2>
          <div class="networks-container">
            <div class="network">
              <h3>🔗 Rail Network</h3>
              <div class="cities" id="railCities">
                <div class="city" onclick="buildNetwork(this, 'rail')">
                  Manchester
                </div>
                <div class="city" onclick="buildNetwork(this, 'rail')">
                  Liverpool
                </div>
                <div class="city" onclick="buildNetwork(this, 'rail')">
                  Leeds
                </div>
                <div class="city" onclick="buildNetwork(this, 'rail')">
                  Birmingham
                </div>
                <div class="city" onclick="buildNetwork(this, 'rail')">
                  Bristol
                </div>
                <div class="city" onclick="buildNetwork(this, 'rail')">
                  London
                </div>
              </div>
            </div>
            <div class="network canal">
              <h3>💧 Canal Network</h3>
              <div class="cities" id="canalCities">
                <div class="city" onclick="buildNetwork(this, 'canal')">
                  Manchester
                </div>
                <div class="city" onclick="buildNetwork(this, 'canal')">
                  Liverpool
                </div>
                <div class="city" onclick="buildNetwork(this, 'canal')">
                  Leeds
                </div>
                <div class="city" onclick="buildNetwork(this, 'canal')">
                  Birmingham
                </div>
                <div class="city" onclick="buildNetwork(this, 'canal')">
                  Bristol
                </div>
                <div class="city" onclick="buildNetwork(this, 'canal')">
                  London
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="sidebar">
          <h2>Players</h2>
          <div class="players-info" id="playersInfo"></div>
          <h2>Your Hand</h2>
          <div class="hand">
            <div class="cards" id="playerHand"></div>
          </div>
          <div class="action-buttons">
            <button onclick="playCard()">Play Card</button>
            <button onclick="endTurn()">End Turn</button>
          </div>
          <h2 style="margin-top: 20px">Game Log</h2>
          <div class="log" id="gameLog"></div>
        </div>
      </div>
    </div>
    <script>
      // Game State
      const gameState = {
        players: [],
        currentPlayerIndex: 0,
        railNetwork: {},
        canalNetwork: {},
        hands: {},
        selectedCard: null,
        isLocalPlayer: false,
      };
      let connection = null;
      let dataChannel = null;
      let localStream = null;
      // Initialize game
      function initGame() {
        const cards = [
          "Iron",
          "Coal",
          "Pottery",
          "Brewery",
          "Factory",
          "Network+",
          "Network++",
        ];
        gameState.players = [
          {
            name: document.getElementById("player1Name").value,
            score: 0,
            money: 30,
          },
          {
            name: document.getElementById("player2Name").value,
            score: 0,
            money: 30,
          },
        ];
        gameState.hands = {
          0: [...cards].sort(() => Math.random() - 0.5),
          1: [...cards].sort(() => Math.random() - 0.5),
        };
        updateUI();
        addLog("Game initialized!");
      }
      // WebRTC Setup
      async function createOffer() {
        try {
          const peerConnection = new RTCPeerConnection({
            iceServers: [{ urls: ["stun:stun.l.google.com:19302"] }],
          });
          connection = peerConnection;
          dataChannel = connection.createDataChannel("brass");
          setupDataChannel();
          connection.onicecandidate = (e) => {
            if (e.candidate === null) {
              document.getElementById("offerText").value = JSON.stringify(
                connection.localDescription,
              );
            }
          };
          const offer = await connection.createOffer();
          await connection.setLocalDescription(offer);
          gameState.isLocalPlayer = true;
          document.getElementById("player1Name").disabled = true;
          addLog("Offer generated. Waiting for answer...");
        } catch (err) {
          alert("Error creating offer: " + err.message);
        }
      }
      async function createAnswer() {
        try {
          const offer = JSON.parse(document.getElementById("offerInput").value);
          const peerConnection = new RTCPeerConnection({
            iceServers: [{ urls: ["stun:stun.l.google.com:19302"] }],
          });
          connection = peerConnection;
          connection.ondatachannel = (e) => {
            dataChannel = e.channel;
            setupDataChannel();
          };
          connection.onicecandidate = (e) => {
            if (e.candidate === null) {
              document.getElementById("answerText").value = JSON.stringify(
                connection.localDescription,
              );
            }
          };
          await connection.setRemoteDescription(
            new RTCSessionDescription(offer),
          );
          const answer = await connection.createAnswer();
          await connection.setLocalDescription(answer);
          gameState.isLocalPlayer = false;
          document.getElementById("player2Name").disabled = true;
          addLog("Answer generated. Waiting for connection...");
        } catch (err) {
          alert("Error creating answer: " + err.message);
        }
      }
      async function consumeAnswer() {
        try {
          const answer = JSON.parse(
            document.getElementById("answerInput").value,
          );
          await connection.setRemoteDescription(
            new RTCSessionDescription(answer),
          );
          addLog("Connected! Starting game...");
          initGame();
        } catch (err) {
          alert("Error consuming answer: " + err.message);
        }
      }
      function setupDataChannel() {
        dataChannel.onopen = () => {
          document.getElementById("connectionStatus").textContent =
            "Connected ✓";
          document.getElementById("connectionStatus").style.color = "#27ae60";
        };
        dataChannel.onmessage = (e) => {
          const message = JSON.parse(e.data);
          handleRemoteAction(message);
        };
        dataChannel.onerror = (err) => {
          console.error("Data channel error:", err);
        };
      }
      // Game Actions
      function buildNetwork(element, type) {
        if (!isCurrentPlayer()) return;
        const cityName = element.textContent;
        const network =
          type === "rail" ? gameState.railNetwork : gameState.canalNetwork;
        if (element.classList.contains("owned")) {
          delete network[cityName];
          element.classList.remove("owned");
        } else {
          network[cityName] =
            gameState.players[gameState.currentPlayerIndex].name;
          element.classList.add("owned");
        }
        sendAction({ type: "buildNetwork", city: cityName, networkType: type });
        addLog("Built " + type + " in " + cityName);
      }
      function playCard() {
        if (!isCurrentPlayer() || !gameState.selectedCard) {
          alert("Select a card to play");
          return;
        }
        const hand = gameState.hands[gameState.currentPlayerIndex];
        const idx = hand.indexOf(gameState.selectedCard);
        hand.splice(idx, 1);
        sendAction({ type: "playCard", card: gameState.selectedCard });
        addLog("Played " + gameState.selectedCard);
        gameState.selectedCard = null;
        updateUI();
      }
      function endTurn() {
        gameState.currentPlayerIndex = 1 - gameState.currentPlayerIndex;
        sendAction({ type: "endTurn" });
        addLog(
          gameState.players[gameState.currentPlayerIndex].name + "'s turn",
        );
        updateUI();
      }
      // Communication
      function sendAction(action) {
        if (dataChannel && dataChannel.readyState === "open") {
          dataChannel.send(JSON.stringify(action));
        }
      }
      function handleRemoteAction(action) {
        switch (action.type) {
          case "buildNetwork":
            const net =
              action.networkType === "rail"
                ? gameState.railNetwork
                : gameState.canalNetwork;
            net[action.city] =
              gameState.players[1 - gameState.currentPlayerIndex].name;
            addLog(
              gameState.players[1 - gameState.currentPlayerIndex].name +
                " built " +
                action.networkType +
                " in " +
                action.city,
              "other",
            );
            break;
          case "playCard":
            addLog(
              gameState.players[1 - gameState.currentPlayerIndex].name +
                " played " +
                action.card,
              "other",
            );
            break;
          case "endTurn":
            gameState.currentPlayerIndex = 1 - gameState.currentPlayerIndex;
            addLog(
              gameState.players[gameState.currentPlayerIndex].name + "'s turn",
              "other",
            );
            break;
        }
        updateUI();
      }
      // UI Updates
      function updateUI() {
        updatePlayersInfo();
        updatePlayerHand();
      }
      function updatePlayersInfo() {
        const info = document.getElementById("playersInfo");
        info.innerHTML = gameState.players
          .map(
            (p, i) => `
                <div class="player ${i === gameState.currentPlayerIndex ? "current" : ""}">
                    <strong>${p.name}</strong> - Money: £${p.money} | Score: ${p.score}
                </div>
            `,
          )
          .join("");
      }
      function updatePlayerHand() {
        const hand = document.getElementById("playerHand");
        const cards = gameState.hands[gameState.currentPlayerIndex] || [];
        hand.innerHTML = cards
          .map(
            (card) => `
                <div class="card ${gameState.selectedCard === card ? "selected" : ""}" 
                     onclick="selectCard('${card}')">
                    ${card}
                </div>
            `,
          )
          .join("");
      }
      function selectCard(cardName) {
        gameState.selectedCard =
          gameState.selectedCard === cardName ? null : cardName;
        updatePlayerHand();
      }
      function isCurrentPlayer() {
        return gameState.isLocalPlayer === (gameState.currentPlayerIndex === 0);
      }
      function addLog(message, type = "own") {
        const log = document.getElementById("gameLog");
        const entry = document.createElement("div");
        entry.className = "log-entry " + type;
        entry.textContent = message;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
      }
    </script>
  </body>
</html>
