<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brass: Birmingham - Official Rules</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #2c3e50;
        color: #ecf0f1;
        padding: 10px;
      }
      .container {
        max-width: 1800px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        color: #333;
      }
      .header {
        background: #1c1c1c;
        color: white;
        padding: 15px;
        text-align: center;
      }
      .setup-area {
        background: #ecf0f1;
        padding: 20px;
        border-bottom: 2px solid #bdc3c7;
      }
      .setup-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        margin-bottom: 15px;
      }
      .setup-box {
        background: white;
        padding: 12px;
        border-radius: 5px;
        border: 1px solid #ddd;
      }
      .setup-box h3 {
        margin-top: 0;
        font-size: 13px;
        color: #2c3e50;
      }
      .setup-box input,
      .setup-box textarea {
        width: 100%;
        padding: 6px;
        border: 1px solid #ddd;
        border-radius: 3px;
        font-size: 11px;
        margin: 5px 0;
      }
      .setup-box textarea {
        height: 50px;
        font-family: monospace;
        resize: vertical;
      }
      .setup-box button {
        background: #3498db;
        color: white;
        padding: 6px 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 11px;
        margin: 3px 3px 3px 0;
      }
      .setup-box button:hover {
        background: #2980b9;
      }
      .status {
        padding: 10px;
        border-radius: 4px;
        margin: 10px 0;
        font-weight: bold;
        text-align: center;
        font-size: 14px;
      }
      .status.disconnected {
        background: #f8d7da;
        color: #721c24;
      }
      .status.connected {
        background: #d4edda;
        color: #155724;
      }
      .game-area {
        display: none;
        padding: 15px;
        grid-template-columns: 1fr 320px;
        gap: 15px;
      }
      .game-area.active {
        display: grid;
      }
      .main-game {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .board-container {
        background: #f9f9f9;
        border-radius: 5px;
        padding: 15px;
        border: 2px solid #bdc3c7;
        flex: 1;
        min-height: 500px;
        overflow: auto;
      }
      svg {
        width: 100%;
        height: 100%;
        min-width: 600px;
        min-height: 500px;
      }
      .city-group {
        cursor: pointer;
      }
      .city-circle {
        stroke: #333;
        stroke-width: 2;
        transition:
          r 0.2s,
          stroke-width 0.2s;
      }
      .city-circle:hover {
        stroke-width: 3;
        r: 28;
      }
      .city-circle.empty {
        fill: #ecf0f1;
      }
      .city-circle.player1 {
        fill: #3498db;
      }
      .city-circle.player2 {
        fill: #e74c3c;
      }
      .city-circle.player3 {
        fill: #f39c12;
      }
      .city-circle.player4 {
        fill: #9b59b6;
      }
      .city-circle.selected {
        stroke: #000;
        stroke-width: 4;
      }
      .city-label {
        font-size: 10px;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
        font-weight: bold;
      }
      .link {
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        cursor: pointer;
        transition: stroke-width 0.2s;
      }
      .link:hover {
        stroke-width: 5;
      }
      .link.canal {
        stroke: #3498db;
      }
      .link.rail {
        stroke: #e74c3c;
      }
      .link.selected {
        stroke-width: 6;
      }
      .link.available {
        stroke: #27ae60;
        stroke-dasharray: 5, 5;
      }
      .link.unavailable {
        stroke: #bdc3c7;
        opacity: 0.5;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .sidebar-section {
        background: #f9f9f9;
        padding: 12px;
        border-radius: 5px;
        border: 1px solid #ddd;
        font-size: 12px;
      }
      .sidebar-section h3 {
        margin-top: 0;
        font-size: 13px;
        color: #2c3e50;
      }
      .player-status {
        background: white;
        padding: 8px;
        border-left: 3px solid #3498db;
        margin: 5px 0;
        font-size: 11px;
      }
      .player-status.current {
        border-left-color: #e74c3c;
        background: #ffe8e8;
      }
      .turn-section {
        background: white;
        padding: 12px;
        border-radius: 5px;
        border: 1px solid #ddd;
      }
      .turn-section h3 {
        margin-top: 0;
        font-size: 13px;
        color: #2c3e50;
      }
      .action-buttons {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .action-btn {
        background: #27ae60;
        color: white;
        padding: 8px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
      }
      .action-btn:hover {
        background: #229954;
      }
      .action-btn:disabled {
        background: #bdc3c7;
        cursor: not-allowed;
      }
      .hand {
        background: white;
        padding: 8px;
        border-radius: 3px;
        max-height: 120px;
        overflow-y: auto;
        border: 1px solid #ddd;
      }
      .card-item {
        background: #ecf0f1;
        padding: 6px;
        margin: 3px 0;
        border-radius: 2px;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .card-item:hover {
        background: #d4edda;
      }
      .card-item.selected {
        background: #e74c3c;
        color: white;
      }
      .log {
        background: white;
        padding: 8px;
        border-radius: 3px;
        max-height: 100px;
        overflow-y: auto;
        border: 1px solid #ddd;
        font-size: 10px;
      }
      .log-entry {
        padding: 2px 0;
        border-bottom: 1px solid #eee;
      }
      .log-entry.own {
        color: #e74c3c;
        font-weight: bold;
      }
      .log-entry.other {
        color: #3498db;
      }
      .log-entry.system {
        color: #95a5a6;
        font-style: italic;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: white;
        color: #333;
        padding: 20px;
        border-radius: 8px;
        max-width: 500px;
        max-height: 80vh;
        overflow-y: auto;
      }
      .modal-content h2 {
        margin-top: 0;
        color: #2c3e50;
      }
      .modal-content h3 {
        color: #2c3e50;
        font-size: 14px;
        margin-top: 12px;
      }
      .modal-content button {
        background: #3498db;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        margin: 5px 5px 5px 0;
      }
      .modal-content button:hover {
        background: #2980b9;
      }
      .modal-content button.danger {
        background: #e74c3c;
      }
      .modal-content button.danger:hover {
        background: #c0392b;
      }
      .modal-content button.success {
        background: #27ae60;
      }
      .modal-content button.success:hover {
        background: #229954;
      }
      .action-flow {
        background: #f9f9f9;
        padding: 12px;
        border-radius: 3px;
        margin: 10px 0;
        border-left: 3px solid #3498db;
      }
      .info-text {
        font-size: 11px;
        color: #555;
        margin: 5px 0;
      }
      .step-indicator {
        background: #e8f4f8;
        padding: 8px;
        border-radius: 3px;
        margin: 8px 0;
        font-weight: bold;
        color: #2c3e50;
      }
      .mode-buttons {
        display: flex;
        gap: 10px;
        margin: 10px 0;
      }
      .mode-buttons button {
        background: #3498db;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      .mode-buttons button.active {
        background: #27ae60;
      }
      .setup-hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Brass: Birmingham - Official Rules</h1>
      </div>

      <!-- SETUP AREA -->
      <div class="setup-area" id="setupArea">
        <div class="mode-buttons">
          <button class="active" onclick="setMode(2)">2 Players</button>
          <button onclick="setMode(3)">3 Players</button>
          <button onclick="setMode(4)">4 Players</button>
        </div>
        <div id="status" class="status disconnected">Status: Disconnected</div>
        <div id="setupBoxes" class="setup-row"></div>
      </div>

      <!-- GAME AREA -->
      <div class="game-area" id="gameArea">
        <div class="main-game">
          <div class="board-container">
            <svg id="board" viewBox="0 0 1000 700"></svg>
          </div>
        </div>

        <div class="sidebar">
          <div class="turn-section">
            <h3>🎮 Your Turn</h3>
            <div class="step-indicator" id="stepIndicator"></div>
            <div class="action-buttons" id="actionButtons"></div>
          </div>

          <div class="sidebar-section">
            <h3>👥 Players</h3>
            <div id="playersStatus"></div>
          </div>

          <div class="sidebar-section">
            <h3>🃏 Your Hand</h3>
            <div class="hand" id="handContainer"></div>
          </div>

          <div class="sidebar-section">
            <h3>📜 Log</h3>
            <div class="log" id="gameLog"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ACTION MODAL -->
    <div class="modal" id="actionModal">
      <div class="modal-content" id="actionModalContent"></div>
    </div>

    <script>
      // ========== MAP CONFIGURATION ==========
      // Easy to edit: Add/remove cities and connections here
      const MAP_CONFIG = {
        cities: {
          Manchester: { x: 150, y: 150, region: "North" },
          Liverpool: { x: 80, y: 200, region: "North" },
          Leeds: { x: 220, y: 120, region: "North" },
          Warrington: { x: 130, y: 180, region: "North", merchant: true },
          Sheffield: { x: 280, y: 180, region: "Midlands" },
          Stoke: { x: 200, y: 250, region: "Midlands" },
          Coventry: { x: 280, y: 300, region: "Midlands" },
          Birmingham: { x: 200, y: 340, region: "Midlands" },
          Kidderminster: { x: 140, y: 360, region: "Midlands" },
          Worcester: { x: 100, y: 400, region: "Midlands" },
          Cannock: { x: 240, y: 280, region: "Midlands" },
          Shrewsbury: { x: 120, y: 280, region: "Midlands", merchant: true },
          Bristol: { x: 120, y: 480, region: "South" },
          Gloucester: { x: 160, y: 440, region: "South", merchant: true },
          Oxford: { x: 240, y: 420, region: "South", merchant: true },
          Nottingham: { x: 340, y: 240, region: "Midlands", merchant: true },
        },
        connections: [
          // Canal connections (era 1)
          { from: "Manchester", to: "Liverpool", type: "canal" },
          { from: "Manchester", to: "Leeds", type: "canal" },
          { from: "Manchester", to: "Warrington", type: "canal" },
          { from: "Liverpool", to: "Warrington", type: "canal" },
          { from: "Leeds", to: "Warrington", type: "canal" },
          { from: "Warrington", to: "Stoke", type: "canal" },
          { from: "Stoke", to: "Birmingham", type: "canal" },
          { from: "Stoke", to: "Coventry", type: "canal" },
          { from: "Coventry", to: "Birmingham", type: "canal" },
          { from: "Coventry", to: "Nottingham", type: "canal" },
          { from: "Nottingham", to: "Sheffield", type: "canal" },
          { from: "Sheffield", to: "Leeds", type: "canal" },
          { from: "Birmingham", to: "Worcester", type: "canal" },
          { from: "Birmingham", to: "Gloucester", type: "canal" },
          { from: "Gloucester", to: "Bristol", type: "canal" },
          { from: "Oxford", to: "Gloucester", type: "canal" },
          { from: "Oxford", to: "Coventry", type: "canal" },
          { from: "Shrewsbury", to: "Stoke", type: "canal" },
          { from: "Shrewsbury", to: "Kidderminster", type: "canal" },
          { from: "Kidderminster", to: "Worcester", type: "canal" },
          { from: "Cannock", to: "Stoke", type: "canal" },
          { from: "Cannock", to: "Birmingham", type: "canal" },
          // Rail connections (era 2)
          { from: "Manchester", to: "Liverpool", type: "rail" },
          { from: "Manchester", to: "Leeds", type: "rail" },
          { from: "Manchester", to: "Sheffield", type: "rail" },
          { from: "Leeds", to: "Sheffield", type: "rail" },
          { from: "Sheffield", to: "Nottingham", type: "rail" },
          { from: "Nottingham", to: "Coventry", type: "rail" },
          { from: "Coventry", to: "Birmingham", type: "rail" },
          { from: "Coventry", to: "Oxford", type: "rail" },
          { from: "Oxford", to: "Gloucester", type: "rail" },
          { from: "Gloucester", to: "Bristol", type: "rail" },
          { from: "Bristol", to: "Worcester", type: "rail" },
          { from: "Worcester", to: "Birmingham", type: "rail" },
          { from: "Birmingham", to: "Stoke", type: "rail" },
          { from: "Stoke", to: "Warrington", type: "rail" },
          { from: "Warrington", to: "Liverpool", type: "rail" },
          { from: "Warrington", to: "Manchester", type: "rail" },
          { from: "Shrewsbury", to: "Stoke", type: "rail" },
          { from: "Shrewsbury", to: "Kidderminster", type: "rail" },
          { from: "Kidderminster", to: "Worcester", type: "rail" },
          { from: "Cannock", to: "Stoke", type: "rail" },
          { from: "Cannock", to: "Birmingham", type: "rail" },
        ],
      };

      // ========== GAME STATE ==========
      let gameMode = 2;
      const gameState = {
        playerId: null,
        totalPlayers: 2,
        playerNames: [],
        players: [],
        currentTurn: 0,
        currentRound: 1,
        era: "Canal",
        hands: [],
        selectedCard: null,
        selectedCity: null,
        selectedLink: null,
        currentAction: null,
        actionStep: null,
        gameActive: false,
        connections: {},
        board: {
          cityTiles: {}, // { cityName: { level, owner } }
          links: {}, // { 'city1-city2-type': owner }
        },
      };

      let dataChannels = {};

      // ========== INITIALIZATION ==========
      function setMode(mode) {
        gameMode = mode;
        gameState.totalPlayers = mode;
        document.querySelectorAll(".mode-buttons button").forEach((btn) => {
          btn.classList.remove("active");
        });
        event.target.classList.add("active");
        generateSetupBoxes(mode);
      }

      function generateSetupBoxes(playerCount) {
        const container = document.getElementById("setupBoxes");
        container.innerHTML = "";

        if (playerCount === 2) {
          container.innerHTML = `
                    <div class="setup-box">
                        <h3>👤 Player 1</h3>
                        <input type="text" placeholder="Your name" id="p1Name" value="Player 1">
                        <button onclick="createOffer(0)" style="font-size: 10px;">Step 1: Generate Offer</button>
                        <label style="font-size: 11px;">Share this with Player 2:</label>
                        <textarea id="offerOutput_0" readonly></textarea>
                        <button onclick="copyToClipboard('offerOutput_0')" style="background: #27ae60; font-size: 10px;">Copy</button>
                    </div>
                    <div class="setup-box">
                        <h3>👥 Player 2</h3>
                        <input type="text" placeholder="Your name" id="p2Name" value="Player 2">
                        <label style="font-size: 11px;">Paste offer from Player 1:</label>
                        <textarea id="offerInput_0" placeholder="Paste offer..."></textarea>
                        <button onclick="createAnswer(0)" style="font-size: 10px;">Step 2: Generate Answer</button>
                        <label style="font-size: 11px;">Share this with Player 1:</label>
                        <textarea id="answerOutput_0" readonly></textarea>
                        <button onclick="copyToClipboard('answerOutput_0')" style="background: #27ae60; font-size: 10px;">Copy</button>
                    </div>
                    <div class="setup-box">
                        <h3>👤 Player 1 - Connect</h3>
                        <label style="font-size: 11px;">Paste answer from Player 2:</label>
                        <textarea id="answerInput_0" placeholder="Paste answer..."></textarea>
                        <button onclick="consumeAnswer(0)" style="font-size: 10px;">Step 3: Connect</button>
                    </div>
                `;
        }
        // Similar for 3 and 4 players...
      }

      async function createOffer(peerId) {
        try {
          gameState.playerId = 0;
          gameState.playerNames = [
            document.getElementById("p1Name").value || "Player 1",
            document.getElementById("p2Name").value || "Player 2",
          ].slice(0, gameMode);

          if (!gameState.connections[peerId]) {
            gameState.connections[peerId] = new RTCPeerConnection({
              iceServers: [{ urls: ["stun:stun.l.google.com:19302"] }],
            });
          }

          const pc = gameState.connections[peerId];
          const dc = pc.createDataChannel("brass");
          dataChannels[peerId] = dc;
          setupDataChannel(peerId);

          pc.onicecandidate = (e) => {
            if (e.candidate === null) {
              document.getElementById(`offerOutput_${peerId}`).value =
                JSON.stringify(pc.localDescription, null, 1);
            }
          };

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          updateStatus("Offer created", "waiting");
        } catch (error) {
          alert("Error: " + error.message);
        }
      }

      async function createAnswer(peerId) {
        try {
          gameState.playerNames = [
            document.getElementById("p1Name")?.value || "Player 1",
            document.getElementById("p2Name")?.value || "Player 2",
          ].slice(0, gameMode);

          gameState.playerId = peerId + 1;

          const offerText = document.getElementById(
            `offerInput_${peerId}`,
          ).value;
          if (!offerText.trim()) {
            alert("Paste offer first");
            return;
          }

          if (!gameState.connections[peerId]) {
            gameState.connections[peerId] = new RTCPeerConnection({
              iceServers: [{ urls: ["stun:stun.l.google.com:19302"] }],
            });
          }

          const pc = gameState.connections[peerId];
          pc.ondatachannel = (e) => {
            dataChannels[peerId] = e.channel;
            setupDataChannel(peerId);
          };

          pc.onicecandidate = (e) => {
            if (e.candidate === null) {
              document.getElementById(`answerOutput_${peerId}`).value =
                JSON.stringify(pc.localDescription, null, 1);
            }
          };

          const offer = JSON.parse(offerText);
          await pc.setRemoteDescription(new RTCSessionDescription(offer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          updateStatus("Answer created", "waiting");
        } catch (error) {
          alert("Error: " + error.message);
        }
      }

      async function consumeAnswer(peerId) {
        try {
          const answerText = document.getElementById(
            `answerInput_${peerId}`,
          ).value;
          if (!answerText.trim()) {
            alert("Paste answer first");
            return;
          }

          const pc = gameState.connections[peerId];
          const answer = JSON.parse(answerText);
          await pc.setRemoteDescription(new RTCSessionDescription(answer));

          const allConnected = Object.values(dataChannels).every(
            (dc) => dc?.readyState === "open",
          );
          if (allConnected) {
            updateStatus("All connected!", "connected");
            setTimeout(startGame, 500);
          }
        } catch (error) {
          alert("Error: " + error.message);
        }
      }

      function setupDataChannel(peerId) {
        const dc = dataChannels[peerId];

        dc.onopen = () => {
          const allConnected = Object.values(dataChannels).every(
            (dc) => dc?.readyState === "open",
          );
          if (allConnected) {
            updateStatus("All connected!", "connected");
            setTimeout(startGame, 300);
          }
        };

        dc.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          handleRemoteAction(msg);
        };

        dc.onerror = (err) => console.error("DC error:", err);
      }

      function updateStatus(msg, type) {
        const el = document.getElementById("status");
        el.textContent = `Status: ${msg}`;
        el.className = `status ${type}`;
      }

      function copyToClipboard(elementId) {
        const el = document.getElementById(elementId);
        el.select();
        document.execCommand("copy");
        alert("Copied!");
      }

      // ========== GAME START ==========
      function startGame() {
        gameState.players = Array(gameState.totalPlayers)
          .fill(null)
          .map(() => ({
            money: 17,
            income: 10,
            vp: 0,
          }));

        gameState.hands = Array(gameState.totalPlayers)
          .fill(null)
          .map(() => generateCards());
        gameState.currentTurn = 0;
        gameState.era = "Canal";
        gameState.gameActive = true;

        document.getElementById("setupArea").classList.add("setup-hidden");
        document.getElementById("gameArea").classList.add("active");

        addLog(
          `Welcome ${gameState.playerNames[gameState.playerId]}!`,
          "system",
        );
        drawBoard();
        updateUI();
      }

      function generateCards() {
        const cards = [];
        Object.keys(MAP_CONFIG.cities).forEach((city) => {
          cards.push({ type: "Location", name: city });
        });
        [
          "Cotton Mill",
          "Coal Mine",
          "Iron Works",
          "Manufacturer",
          "Pottery",
          "Brewery",
        ].forEach((ind) => {
          cards.push({ type: "Industry", name: ind });
        });
        return cards.sort(() => Math.random() - 0.5).slice(0, 8);
      }

      // ========== BOARD DRAWING ==========
      function drawBoard() {
        const svg = document.getElementById("board");
        svg.innerHTML = "";

        // Draw links first (so they appear behind cities)
        MAP_CONFIG.connections.forEach((conn) => {
          if (
            (gameState.era === "Canal" && conn.type === "canal") ||
            (gameState.era === "Rail" && conn.type === "rail")
          ) {
            drawLink(svg, conn);
          }
        });

        // Draw cities
        Object.entries(MAP_CONFIG.cities).forEach(([name, pos]) => {
          drawCity(svg, name, pos);
        });
      }

      function drawCity(svg, name, pos) {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.classList.add("city-group");
        g.onclick = () => selectCity(name);
        g.style.cursor = "pointer";

        const circle = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle",
        );
        circle.classList.add("city-circle", "empty");
        circle.setAttribute("cx", pos.x);
        circle.setAttribute("cy", pos.y);
        circle.setAttribute("r", 25);

        const label = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "text",
        );
        label.classList.add("city-label");
        label.setAttribute("x", pos.x);
        label.setAttribute("y", pos.y);
        label.textContent = name.substring(0, 4);

        g.appendChild(circle);
        g.appendChild(label);
        svg.appendChild(g);
      }

      function drawLink(svg, conn) {
        const from = MAP_CONFIG.cities[conn.from];
        const to = MAP_CONFIG.cities[conn.to];

        const line = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "line",
        );
        line.classList.add("link", conn.type);
        line.setAttribute("x1", from.x);
        line.setAttribute("y1", from.y);
        line.setAttribute("x2", to.x);
        line.setAttribute("y2", to.y);
        line.onclick = (e) => {
          e.stopPropagation();
          selectLink(conn.from, conn.to, conn.type);
        };

        svg.appendChild(line);
      }

      function selectCity(name) {
        if (
          gameState.currentAction === "Build" ||
          gameState.currentAction === "Network"
        ) {
          gameState.selectedCity =
            gameState.selectedCity === name ? null : name;
          drawBoard();
        }
      }

      function selectLink(from, to, type) {
        if (gameState.currentAction === "Network") {
          gameState.selectedLink = `${from}-${to}-${type}`;
          drawBoard();
        }
      }

      // ========== ACTION FLOW ==========
      function startAction(actionName) {
        gameState.currentAction = actionName;
        gameState.actionStep = 1;

        switch (actionName) {
          case "Build":
            showBuildFlow();
            break;
          case "Network":
            showNetworkFlow();
            break;
          case "Develop":
            showDevelopFlow();
            break;
          case "Sell":
            showSellFlow();
            break;
          case "Loan":
            showLoanFlow();
            break;
          case "Scout":
            showScoutFlow();
            break;
        }
      }

      function showBuildFlow() {
        const modal = document.getElementById("actionModal");
        const content = document.getElementById("actionModalContent");

        if (gameState.actionStep === 1) {
          content.innerHTML = `
                    <h2>🏭 Build Action - Step 1: Select Card</h2>
                    <div class="action-flow">
                        <p>Choose a card to build with:</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            ${gameState.hands[gameState.playerId]
                              .map(
                                (card, i) => `
                                <button onclick="selectBuildCard(${i})" 
                                        style="padding: 10px; ${gameState.selectedCard === i ? "background: #27ae60; color: white;" : "background: #ecf0f1;"}">
                                    ${card.type === "Location" ? "📍" : "🏭"} ${card.name}
                                </button>
                            `,
                              )
                              .join("")}
                        </div>
                    </div>
                    <button onclick="buildStep2()" ${gameState.selectedCard === null ? "disabled" : ""} class="success">Next</button>
                    <button onclick="cancelAction()" class="danger">Cancel</button>
                `;
        } else if (gameState.actionStep === 2) {
          content.innerHTML = `
                    <h2>🏭 Build Action - Step 2: Select City</h2>
                    <div class="action-flow">
                        <p>Click a city on the map to build in.</p>
                        <p>Selected Card: <strong>${gameState.hands[gameState.playerId][gameState.selectedCard].name}</strong></p>
                        <p>Selected City: <strong>${gameState.selectedCity || "None"}</strong></p>
                    </div>
                    <button onclick="buildStep3()" ${!gameState.selectedCity ? "disabled" : ""} class="success">Next</button>
                    <button onclick="buildStep1()" class="danger">Back</button>
                `;
        } else if (gameState.actionStep === 3) {
          content.innerHTML = `
                    <h2>🏭 Build Action - Confirm</h2>
                    <div class="action-flow">
                        <p>Building <strong>${gameState.hands[gameState.playerId][gameState.selectedCard].name}</strong></p>
                        <p>In <strong>${gameState.selectedCity}</strong></p>
                        <p>Cost: £8</p>
                    </div>
                    <button onclick="executeBuild()" class="success">Confirm Build</button>
                    <button onclick="buildStep2()" class="danger">Back</button>
                `;
        }

        modal.classList.add("active");
      }

      function buildStep1() {
        gameState.actionStep = 1;
        showBuildFlow();
      }
      function buildStep2() {
        gameState.actionStep = 2;
        showBuildFlow();
      }
      function buildStep3() {
        gameState.actionStep = 3;
        showBuildFlow();
      }

      function selectBuildCard(idx) {
        gameState.selectedCard = gameState.selectedCard === idx ? null : idx;
        showBuildFlow();
      }

      function executeBuild() {
        const card =
          gameState.hands[gameState.playerId][gameState.selectedCard];
        const city = gameState.selectedCity;

        gameState.players[gameState.playerId].money -= 8;
        gameState.hands[gameState.playerId].splice(gameState.selectedCard, 1);

        broadcastAction({
          type: "build",
          playerId: gameState.playerId,
          city: city,
          card: card.name,
        });

        addLog(`Built ${card.name} in ${city}`, "own");
        resetAction();
        endTurn();
      }

      function showNetworkFlow() {
        const modal = document.getElementById("actionModal");
        const content = document.getElementById("actionModalContent");

        if (gameState.actionStep === 1) {
          content.innerHTML = `
                    <h2>🔗 Network Action - Step 1: Select Card</h2>
                    <div class="action-flow">
                        <p>Choose any card to discard:</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            ${gameState.hands[gameState.playerId]
                              .map(
                                (card, i) => `
                                <button onclick="selectNetworkCard(${i})" 
                                        style="padding: 10px; ${gameState.selectedCard === i ? "background: #27ae60; color: white;" : "background: #ecf0f1;"}">
                                    ${card.type === "Location" ? "📍" : card.type === "Industry" ? "🏭" : "⭐"} ${card.name}
                                </button>
                            `,
                              )
                              .join("")}
                        </div>
                    </div>
                    <button onclick="networkStep2()" ${gameState.selectedCard === null ? "disabled" : ""} class="success">Next</button>
                    <button onclick="cancelAction()" class="danger">Cancel</button>
                `;
        } else if (gameState.actionStep === 2) {
          content.innerHTML = `
                    <h2>🔗 Network Action - Step 2: Select Link</h2>
                    <div class="action-flow">
                        <p>Click a link on the map to build.</p>
                        <p>Type: ${gameState.era}</p>
                        <p>Cost: £${gameState.era === "Canal" ? 3 : 5}</p>
                        <p>Selected Link: <strong>${gameState.selectedLink || "None"}</strong></p>
                    </div>
                    <button onclick="networkStep3()" ${!gameState.selectedLink ? "disabled" : ""} class="success">Next</button>
                    <button onclick="networkStep1()" class="danger">Back</button>
                `;
        } else if (gameState.actionStep === 3) {
          content.innerHTML = `
                    <h2>🔗 Network Action - Confirm</h2>
                    <div class="action-flow">
                        <p>Building ${gameState.era} link</p>
                        <p>Between <strong>${gameState.selectedLink}</strong></p>
                        <p>Cost: £${gameState.era === "Canal" ? 3 : 5}</p>
                    </div>
                    <button onclick="executeNetwork()" class="success">Confirm Network</button>
                    <button onclick="networkStep2()" class="danger">Back</button>
                `;
        }

        modal.classList.add("active");
      }

      function networkStep1() {
        gameState.actionStep = 1;
        showNetworkFlow();
      }
      function networkStep2() {
        gameState.actionStep = 2;
        showNetworkFlow();
      }
      function networkStep3() {
        gameState.actionStep = 3;
        showNetworkFlow();
      }

      function selectNetworkCard(idx) {
        gameState.selectedCard = gameState.selectedCard === idx ? null : idx;
        showNetworkFlow();
      }

      function executeNetwork() {
        const cost = gameState.era === "Canal" ? 3 : 5;
        gameState.players[gameState.playerId].money -= cost;
        gameState.hands[gameState.playerId].splice(gameState.selectedCard, 1);

        broadcastAction({
          type: "network",
          playerId: gameState.playerId,
          link: gameState.selectedLink,
          era: gameState.era,
        });

        addLog(`Built ${gameState.era} link: ${gameState.selectedLink}`, "own");
        resetAction();
        endTurn();
      }

      function showDevelopFlow() {
        const modal = document.getElementById("actionModal");
        const content = document.getElementById("actionModalContent");

        content.innerHTML = `
                <h2>📈 Develop Action</h2>
                <div class="action-flow">
                    <p>Remove industry tiles from your mat (1 iron per tile)</p>
                    <p>This will unlock higher-level industries.</p>
                </div>
                <button onclick="executeDevelop()" class="success">Execute</button>
                <button onclick="cancelAction()" class="danger">Cancel</button>
            `;

        modal.classList.add("active");
      }

      function executeDevelop() {
        const hand = gameState.hands[gameState.playerId];
        if (hand.length > 0) {
          hand.pop();
        }

        broadcastAction({
          type: "develop",
          playerId: gameState.playerId,
        });

        addLog(`Developed industries`, "own");
        resetAction();
        endTurn();
      }

      function showSellFlow() {
        const modal = document.getElementById("actionModal");
        const content = document.getElementById("actionModalContent");

        content.innerHTML = `
                <h2>💰 Sell Action</h2>
                <div class="action-flow">
                    <p>Flip cotton mills, manufacturers, or potteries to earn points.</p>
                    <p>Requires connection to Merchant tile.</p>
                </div>
                <button onclick="executeSell()" class="success">Execute</button>
                <button onclick="cancelAction()" class="danger">Cancel</button>
            `;

        modal.classList.add("active");
      }

      function executeSell() {
        broadcastAction({
          type: "sell",
          playerId: gameState.playerId,
        });

        addLog(`Sold industries`, "own");
        resetAction();
        endTurn();
      }

      function showLoanFlow() {
        const modal = document.getElementById("actionModal");
        const content = document.getElementById("actionModalContent");

        content.innerHTML = `
                <h2>💳 Loan Action</h2>
                <div class="action-flow">
                    <p>Take £30 from the bank</p>
                    <p>Your income level moves back 3 levels</p>
                </div>
                <button onclick="executeLoan()" class="success">Take Loan</button>
                <button onclick="cancelAction()" class="danger">Cancel</button>
            `;

        modal.classList.add("active");
      }

      function executeLoan() {
        gameState.players[gameState.playerId].money += 30;
        gameState.players[gameState.playerId].income -= 3;

        broadcastAction({
          type: "loan",
          playerId: gameState.playerId,
        });

        addLog(`Took £30 loan`, "own");
        resetAction();
        endTurn();
      }

      function showScoutFlow() {
        const modal = document.getElementById("actionModal");
        const content = document.getElementById("actionModalContent");

        content.innerHTML = `
                <h2>🔍 Scout Action</h2>
                <div class="action-flow">
                    <p>Discard 3 cards to get Wild Location + Wild Industry</p>
                </div>
                <button onclick="executeScout()" class="success">Scout</button>
                <button onclick="cancelAction()" class="danger">Cancel</button>
            `;

        modal.classList.add("active");
      }

      function executeScout() {
        const hand = gameState.hands[gameState.playerId];
        while (hand.length > 5) hand.pop();
        hand.push({ type: "Wild", name: "Wild Location" });
        hand.push({ type: "Wild", name: "Wild Industry" });

        broadcastAction({
          type: "scout",
          playerId: gameState.playerId,
        });

        addLog(`Scouted for wild cards`, "own");
        resetAction();
        endTurn();
      }

      function cancelAction() {
        resetAction();
        document.getElementById("actionModal").classList.remove("active");
      }

      function resetAction() {
        gameState.currentAction = null;
        gameState.actionStep = null;
        gameState.selectedCard = null;
        gameState.selectedCity = null;
        gameState.selectedLink = null;
        drawBoard();
      }

      // ========== TURN MANAGEMENT ==========
      function endTurn() {
        gameState.currentTurn =
          (gameState.currentTurn + 1) % gameState.totalPlayers;
        addLog(
          `${gameState.playerNames[gameState.currentTurn]}'s turn`,
          "system",
        );
        broadcastAction({ type: "endTurn", nextPlayer: gameState.currentTurn });
        updateUI();
      }

      function updateUI() {
        updatePlayersStatus();
        updateHandDisplay();
        updateStepIndicator();
        if (
          gameState.currentTurn === gameState.playerId &&
          gameState.currentAction === null
        ) {
          showActionButtons();
        } else {
          document.getElementById("actionButtons").innerHTML = "";
        }
      }

      function updatePlayersStatus() {
        const cont = document.getElementById("playersStatus");
        cont.innerHTML = gameState.players
          .map(
            (p, i) => `
                <div class="player-status ${i === gameState.currentTurn ? "current" : ""}">
                    <strong>${gameState.playerNames[i]}</strong><br>
                    💰 £${p.money} | 📊 VP: ${p.vp}
                </div>
            `,
          )
          .join("");
      }

      function updateHandDisplay() {
        const cont = document.getElementById("handContainer");
        const hand = gameState.hands[gameState.playerId] || [];
        cont.innerHTML = hand
          .map(
            (card, i) => `
                <div class="card-item">
                    ${card.type === "Location" ? "📍" : card.type === "Industry" ? "🏭" : "⭐"} ${card.name}
                </div>
            `,
          )
          .join("");
      }

      function updateStepIndicator() {
        const step = document.getElementById("stepIndicator");
        if (gameState.currentTurn === gameState.playerId) {
          step.innerHTML = `<span style="color: #27ae60;">✓ Your Turn - Choose an Action</span>`;
        } else {
          step.innerHTML = `<span style="color: #3498db;">⏳ Waiting for ${gameState.playerNames[gameState.currentTurn]}</span>`;
        }
      }

      function showActionButtons() {
        const cont = document.getElementById("actionButtons");
        cont.innerHTML = `
                <button class="action-btn" onclick="startAction('Build')">🏭 Build</button>
                <button class="action-btn" onclick="startAction('Network')">🔗 Network</button>
                <button class="action-btn" onclick="startAction('Develop')">📈 Develop</button>
                <button class="action-btn" onclick="startAction('Sell')">💰 Sell</button>
                <button class="action-btn" onclick="startAction('Loan')">💳 Loan</button>
                <button class="action-btn" onclick="startAction('Scout')">🔍 Scout</button>
            `;
      }

      // ========== COMMUNICATION ==========
      function broadcastAction(action) {
        Object.values(dataChannels).forEach((dc) => {
          if (dc?.readyState === "open") {
            dc.send(JSON.stringify(action));
          }
        });
      }

      function handleRemoteAction(action) {
        switch (action.type) {
          case "build":
            addLog(
              `${gameState.playerNames[action.playerId]} built in ${action.city}`,
              "other",
            );
            break;
          case "network":
            addLog(
              `${gameState.playerNames[action.playerId]} built ${action.era} link`,
              "other",
            );
            break;
          case "endTurn":
            gameState.currentTurn = action.nextPlayer;
            break;
        }
        updateUI();
      }

      // ========== UTILITIES ==========
      function addLog(msg, type = "own") {
        const log = document.getElementById("gameLog");
        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;
        entry.textContent = msg;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
      }

      // Initialize
      generateSetupBoxes(2);
    </script>
  </body>
</html>
